<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"><title>Found Items</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="navbar">
    <a href="/">Home</a>
    <a href="/User/report-found">Report Found Item</a>
    <a href="/lost-items">Lost Items</a>
</div>
<h2>Found Items</h2>
<form method="get" action="/found-items">
    <input type="text" name="q" placeholder="search by name or location"/>
    <button>Search</button>
</form>
<table border="1">
    <tr><th>Item</th><th>Location</th><th>Description</th><th>Status</th><th>Image</th><th>Action</th></tr>
    <tr th:each="it : ${foundItems}">
        <td><strong th:text="${it.itemName}"></strong><br><small>ID: <span th:text="${it.id}"></span></small></td>
        <td th:text="${it.location}"></td>
        <td th:text="${it.description}"></td>
        <td th:text="${it.status}"></td>
        <td>
            <img th:if="${it.imagePath != null}" th:src="@{'/uploads/' + ${it.imagePath}}" width="100" height="80" alt="Image">
            <span th:if="${it.imagePath == null}">No Image</span>
        </td>
        <td>
            <form th:action="@{/claim}" method="post">
                <input type="hidden" name="foundId" th:value="${it.id}" />
                <label>Lost item</label>
                <select name="lostId" required>
                    <option th:each="lost : ${lostItems}" th:value="${lost.id}" th:text="${lost.id + ' - ' + lost.itemName}"></option>
                </select>
                <label>Proof message</label>
                <textarea name="message" placeholder="Describe proof of ownership"></textarea>
                <button type="submit">Claim</button>
            </form>
        </td>
    </tr>
</table>
</body>
</html>
